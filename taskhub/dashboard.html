<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskHub Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
            color: #ffffff;
        }

        .dashboard {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: #16212e;
            border-right: 1px solid #2a3447;
            padding: 24px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            font-weight: 700;
            font-size: 18px;
        }

        .brand-logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #00d4ff, #0095ff);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .nav-item {
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #a0aec0;
            transition: all 0.3s;
            font-weight: 500;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            border-left-color: #00d4ff;
        }

        .nav-item.active {
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
            border-left-color: #00d4ff;
        }

        .nav-icon {
            font-size: 18px;
        }

        .user-section {
            border-top: 1px solid #2a3447;
            padding-top: 20px;
            margin-top: auto;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 10px;
            margin-bottom: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #00d4ff, #0095ff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            font-size: 13px;
        }

        .user-email {
            font-size: 11px;
            color: #a0aec0;
            margin-top: 2px;
            display: block;
        }

        .btn-logout {
            width: 100%;
            padding: 10px 16px;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            color: #ef4444;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: #ef4444;
            color: white;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            background: #16212e;
            border-bottom: 1px solid #2a3447;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .search-box {
            flex: 1;
            max-width: 400px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 12px 10px 36px;
            background: #1a2335;
            border: 1px solid #2a3447;
            border-radius: 8px;
            color: #ffffff;
            font-size: 13px;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.15);
        }

        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
        }

        .date-display {
            font-size: 13px;
            color: #a0aec0;
            white-space: nowrap;
        }

        .topbar-right {
            display: flex;
            gap: 12px;
        }

        .btn-icon {
            padding: 8px 12px;
            background: #1a2335;
            border: 1px solid #2a3447;
            border-radius: 8px;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
        }

        .btn-icon:hover {
            border-color: #00d4ff;
            color: #00d4ff;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 149, 255, 0.05) 100%);
            border: 1px solid rgba(0, 212, 255, 0.2);
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .stat-card:hover {
            border-color: #00d4ff;
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.2);
        }

        .stat-icon {
            font-size: 24px;
            margin-bottom: 12px;
        }

        .stat-label {
            font-size: 12px;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #0095ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .new-task {
            background: #16212e;
            border: 1px solid #2a3447;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 24px;
        }

        .new-task h3 {
            margin-bottom: 20px;
            font-size: 16px;
        }

        .task-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            color: #ffffff;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            padding: 10px 12px;
            background: #1a2335;
            border: 1px solid #2a3447;
            border-radius: 8px;
            color: #ffffff;
            font-size: 13px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #a0aec0;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .btn-add {
            padding: 10px 24px;
            background: linear-gradient(135deg, #00d4ff 0%, #0095ff 100%);
            border: none;
            border-radius: 8px;
            color: #000000;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            align-self: flex-start;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 212, 255, 0.3);
        }

        .tasks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        .task-card {
            background: #16212e;
            border: 1px solid #2a3447;
            padding: 16px;
            border-radius: 10px;
            transition: all 0.3s;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .task-card:hover {
            border-color: #00d4ff;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.15);
        }

        .task-title {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 8px;
        }

        .task-date {
            font-size: 12px;
            color: #a0aec0;
            margin-bottom: 12px;
        }

        .task-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .badge-high {
            background: rgba(239, 68, 68, 0.2);
            color: #ff6b7b;
        }

        .badge-medium {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
        }

        .badge-low {
            background: rgba(16, 185, 129, 0.2);
            color: #6ee7b7;
        }

        .task-actions {
            display: flex;
            gap: 8px;
            border-top: 1px solid #2a3447;
            padding-top: 12px;
            margin-top: 12px;
        }

        .task-btn {
            flex: 1;
            padding: 8px 12px;
            background: transparent;
            border: 1px solid #2a3447;
            border-radius: 6px;
            color: #a0aec0;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .task-btn:hover {
            border-color: #00d4ff;
            color: #00d4ff;
            background: rgba(0, 212, 255, 0.05);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #a0aec0;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 18px;
            color: #ffffff;
            margin-bottom: 8px;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1f2e;
        }

        ::-webkit-scrollbar-thumb {
            background: #2a3447;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #00d4ff;
        }

        @media (max-width: 768px) {
            .dashboard {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                padding: 16px;
                flex-direction: row;
                align-items: center;
                border-right: none;
                border-bottom: 1px solid #2a3447;
                overflow-x: auto;
            }

            .nav {
                flex-direction: row;
                flex: 1;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .tasks-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-logo">✓</div>
                <span>TaskHub</span>
            </div>

            <nav class="nav">
                <div class="nav-item active" onclick="switchView('dashboard')">
                    <span class="nav-icon">📊</span>
                    <span>Dashboard</span>
                </div>
                <div class="nav-item" onclick="switchView('active')">
                    <span class="nav-icon">⚡</span>
                    <span>Active</span>
                </div>
                <div class="nav-item" onclick="switchView('completed')">
                    <span class="nav-icon">✅</span>
                    <span>Completed</span>
                </div>
                <div class="nav-item" onclick="switchView('expired')">
                    <span class="nav-icon">⏰</span>
                    <span>Expired</span>
                </div>
            </nav>

            <div class="user-section">
                <div class="user-profile">
                    <div class="user-avatar">👤</div>
                    <div class="user-info">
                        <div class="user-name" id="userName">User</div>
                        <small class="user-email" id="userEmail">email@example.com</small>
                    </div>
                </div>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <div class="main">
            <!-- TOPBAR -->
            <div class="topbar">
                <div style="display: flex; gap: 20px; flex: 1; align-items: center;">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Search tasks..." onkeyup="searchTasks()">
                        <span class="search-icon">🔍</span>
                    </div>
                    <span class="date-display" id="dateDisplay"></span>
                </div>
                <div class="topbar-right">
                    <button class="btn-icon" onclick="toggleTheme()">🌙</button>
                </div>
            </div>

            <!-- CONTENT -->
            <div class="content">
                <!-- DASHBOARD VIEW -->
                <div id="dashboard" class="view active">
                    <div class="stats-grid">
                        <div class="stat-card" onclick="switchView('active')">
                            <div class="stat-icon">📋</div>
                            <div class="stat-label">Active</div>
                            <div class="stat-value" id="activeCount">0</div>
                        </div>
                        <div class="stat-card" onclick="switchView('completed')">
                            <div class="stat-icon">✅</div>
                            <div class="stat-label">Completed</div>
                            <div class="stat-value" id="completedCount">0</div>
                        </div>
                        <div class="stat-card" onclick="switchView('expired')">
                            <div class="stat-icon">⏰</div>
                            <div class="stat-label">Expired</div>
                            <div class="stat-value" id="expiredCount">0</div>
                        </div>
                    </div>

                    <div class="new-task">
                        <h3>➕ Create New Task</h3>
                        <form class="task-form" id="taskForm" onsubmit="addTask(event)">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Task Name</label>
                                    <input type="text" id="taskName" placeholder="What needs to be done?" required>
                                </div>
                                <div class="form-group">
                                    <label>Due Date</label>
                                    <input type="date" id="taskDueDate" required>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Description</label>
                                    <textarea id="taskDesc" placeholder="Add details..."></textarea>
                                </div>
                                <div class="form-group">
                                    <label>Priority</label>
                                    <select id="taskPriority">
                                        <option value="low">Low</option>
                                        <option value="medium" selected>Medium</option>
                                        <option value="high">High</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Category</label>
                                    <select id="taskCategory">
                                        <option value="work">Work</option>
                                        <option value="personal" selected>Personal</option>
                                        <option value="study">Study</option>
                                        <option value="fitness">Fitness</option>
                                    </select>
                                </div>
                            </div>
                            <button type="submit" class="btn-add">Add Task</button>
                        </form>
                    </div>
                </div>

                <!-- ACTIVE TASKS -->
                <div id="active" class="view">
                    <h2 style="margin-bottom: 20px;">Active Tasks</h2>
                    <div class="tasks-grid" id="activeTasksList"></div>
                </div>

                <!-- COMPLETED TASKS -->
                <div id="completed" class="view">
                    <h2 style="margin-bottom: 20px;">Completed Tasks</h2>
                    <div class="tasks-grid" id="completedTasksList"></div>
                </div>

                <!-- EXPIRED TASKS -->
                <div id="expired" class="view">
                    <h2 style="margin-bottom: 20px;">Expired Tasks</h2>
                    <div class="tasks-grid" id="expiredTasksList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = JSON.parse(sessionStorage.getItem('taskhub_current_user'));
        if (!currentUser) {
            window.location.href = 'index.html';
        }

        let tasks = JSON.parse(localStorage.getItem(`taskhub_tasks_${currentUser.id}`)) || [];
        document.getElementById('userName').textContent = currentUser.name;
        document.getElementById('userEmail').textContent = currentUser.email;
        updateDate();
        renderDashboard();

        function updateDate() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const today = new Date().toLocaleDateString('en-US', options);
            document.getElementById('dateDisplay').textContent = today;
            document.getElementById('taskDueDate').setAttribute('min', new Date().toISOString().split('T')[0]);
        }

        function addTask(e) {
            e.preventDefault();
            const name = document.getElementById('taskName').value.trim();
            const dueDate = document.getElementById('taskDueDate').value;
            const desc = document.getElementById('taskDesc').value.trim();
            const priority = document.getElementById('taskPriority').value;
            const category = document.getElementById('taskCategory').value;

            if (!name || !dueDate) {
                alert('Please fill task name and due date');
                return;
            }

            tasks.push({
                id: Date.now(),
                name,
                dueDate,
                desc,
                priority,
                category,
                completed: false,
                created: new Date().toLocaleDateString()
            });

            localStorage.setItem(`taskhub_tasks_${currentUser.id}`, JSON.stringify(tasks));
            document.getElementById('taskForm').reset();
            renderDashboard();
            alert('✅ Task added!');
        }

        function completeTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = true;
                localStorage.setItem(`taskhub_tasks_${currentUser.id}`, JSON.stringify(tasks));
                renderDashboard();
            }
        }

        function deleteTask(id) {
            if (confirm('Delete task?')) {
                tasks = tasks.filter(t => t.id !== id);
                localStorage.setItem(`taskhub_tasks_${currentUser.id}`, JSON.stringify(tasks));
                renderDashboard();
            }
        }

        function isExpired(dueDate) {
            return new Date(dueDate) < new Date().setHours(0,0,0,0) && !tasks.find(t => t.dueDate === dueDate).completed;
        }

        function renderTasks(status) {
            let filtered = tasks;
            if (status === 'active') {
                filtered = tasks.filter(t => !t.completed && new Date(t.dueDate) >= new Date().setHours(0,0,0,0));
            } else if (status === 'completed') {
                filtered = tasks.filter(t => t.completed);
            } else if (status === 'expired') {
                filtered = tasks.filter(t => !t.completed && new Date(t.dueDate) < new Date().setHours(0,0,0,0));
            }

            const container = document.getElementById(status + 'TasksList');
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><div class="empty-icon">📭</div><h3>No tasks</h3></div>';
                return;
            }

            container.innerHTML = filtered.map(task => `
                <div class="task-card">
                    <div class="task-title">${task.name}</div>
                    <div class="task-date">📅 ${new Date(task.dueDate).toLocaleDateString()}</div>
                    <span class="task-badge badge-${task.priority}">${task.priority}</span>
                    ${task.desc ? `<p style="font-size: 12px; color: #a0aec0; margin: 8px 0;">${task.desc}</p>` : ''}
                    <div class="task-actions">
                        ${!task.completed ? `<button class="task-btn" onclick="completeTask(${task.id})">✓ Complete</button>` : ''}
                        <button class="task-btn" onclick="deleteTask(${task.id})">🗑️ Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function updateStats() {
            const active = tasks.filter(t => !t.completed && new Date(t.dueDate) >= new Date().setHours(0,0,0,0)).length;
            const completed = tasks.filter(t => t.completed).length;
            const expired = tasks.filter(t => !t.completed && new Date(t.dueDate) < new Date().setHours(0,0,0,0)).length;

            document.getElementById('activeCount').textContent = active;
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('expiredCount').textContent = expired;
        }

        function renderDashboard() {
            updateStats();
            renderTasks('active');
            renderTasks('completed');
            renderTasks('expired');
        }

        function switchView(view) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(view).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.target.closest('.nav-item').classList.add('active');
        }

        function logout() {
            if (confirm('Logout?')) {
                sessionStorage.removeItem('taskhub_current_user');
                window.location.href = 'index.html';
            }
        }

        function searchTasks() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = tasks.filter(t => t.name.toLowerCase().includes(term));
            
            const container = document.getElementById('activeTasksList');
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><div class="empty-icon">🔍</div><h3>No results</h3></div>';
                return;
            }

            container.innerHTML = filtered.map(task => `
                <div class="task-card">
                    <div class="task-title">${task.name}</div>
                    <div class="task-date">📅 ${new Date(task.dueDate).toLocaleDateString()}</div>
                    <span class="task-badge badge-${task.priority}">${task.priority}</span>
                    <div class="task-actions">
                        ${!task.completed ? `<button class="task-btn" onclick="completeTask(${task.id})">✓ Complete</button>` : ''}
                        <button class="task-btn" onclick="deleteTask(${task.id})">🗑️ Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function toggleTheme() {
            document.body.style.filter = document.body.style.filter === 'invert(1)' ? 'none' : 'invert(1)';
        }
    </script>
</body>
</html>
